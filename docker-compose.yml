services:
  db_mysql:
    image: mysql:9.3
    restart: on-failure
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -uroot -p$$MYSQL_ROOT_PASSWORD -e \"SELECT COUNT(*) FROM $$MYSQL_DATABASE.utilisateurs\" | tail -n 1 | grep -qx 4",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - backend

  admin_mysql:
    image: adminer
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db_mysql
    depends_on:
      db_mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8080/')?0:1);\""]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - backend
      - public

  db_mongo:
    build:
      context: ./mongo
    restart: on-failure
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_DB=${MONGO_DB}
    volumes:
      - mongo_data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh \"mongodb://$${MONGO_INITDB_ROOT_USERNAME}:$${MONGO_INITDB_ROOT_PASSWORD}@localhost:27017/admin\" --quiet --eval \"db.getSiblingDB('$${MONGO_DB}').posts.countDocuments()\" | grep -qx 5",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - backend

  admin_mongo:
    image: mongo-express
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - ME_CONFIG_MONGODB_SERVER=db_mongo
    depends_on:
      db_mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8081/status >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - backend
      - public

  api:
    build:
      context: ./api
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=${API_MYSQL_HOST}
      - MYSQL_PORT=${API_MYSQL_PORT}
      - MYSQL_DATABASE=${API_MYSQL_DATABASE}
      - MYSQL_USER=${API_MYSQL_USER}
      - MYSQL_PASSWORD=${API_MYSQL_PASSWORD}
      - MONGO_DB=${API_MONGO_DB}
      - MONGO_URI=${API_MONGO_URI}
    depends_on:
      db_mysql:
        condition: service_healthy
      db_mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json,urllib.request; u=json.load(urllib.request.urlopen('http://127.0.0.1:8000/users')); p=json.load(urllib.request.urlopen('http://127.0.0.1:8000/posts')); raise SystemExit(0 if u.get('count')==4 and p.get('count')==5 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - backend
      - public

networks:
  backend:
    internal: true
  public:

volumes:
  mysql_data:
  mongo_data:
